name: 'Perl versions'
description: 'Generate Perl versions list for your matrix'
inputs:
  since-perl:
    description: "List all Perl versions since this (including this). See README for available versions and formats."
    type: string
    required: true
  until-perl:
    description: "List all Perl versions up to this (including this). See README for available versions and formats."
    type: string
    default: 'latest'
  with-devel:
    description: "Whether to include also 'devel' Perl"
    type: boolean
    default: false
outputs:
  perl-versions:
    description: "JSON containing list of perl versions"
runs:
  using: "node24"
  main: "dist/index.js"
